<div class="page-header flex justify-between items-center mb-4">
  <h2>{{ isEdicao ? 'Editar Paciente' : 'Novo Paciente' }}</h2>
  <a routerLink="/dashboard/pacientes" class="btn btn-danger">Voltar</a>
</div>

<div class="glass-card">
  <div *ngIf="isLoading" class="text-center mb-4">
    <span class="spinner">↻</span> Carregando...
  </div>

  <form (ngSubmit)="onSubmit()" #pacienteForm="ngForm" *ngIf="!isLoading">
    
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label" for="nome">Nome</label>
        <input type="text" id="nome" name="nome" class="form-control" [(ngModel)]="paciente.nome" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input type="email" id="email" name="email" class="form-control" [(ngModel)]="paciente.email" required email />
      </div>

      <div class="form-group">
        <label class="form-label" for="telefone">Telefone</label>
        <input type="tel" id="telefone" name="telefone" class="form-control" [(ngModel)]="paciente.telefone" required />
      </div>

      <div class="form-group" *ngIf="!isEdicao">
        <label class="form-label" for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" class="form-control" [(ngModel)]="paciente.cpf" required />
      </div>
    </div>

    <h3 class="mt-4">Endereço</h3>
    <hr class="mb-4" style="border-color: rgba(255,255,255,0.1)">
    
    <div class="form-grid">
      <div class="form-group" style="grid-column: span 2;">
        <label class="form-label" for="logradouro">Logradouro</label>
        <input type="text" id="logradouro" name="logradouro" class="form-control" [(ngModel)]="paciente.endereco.logradouro" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="numero">Número</label>
        <input type="text" id="numero" name="numero" class="form-control" [(ngModel)]="paciente.endereco.numero" />
      </div>

      <div class="form-group">
        <label class="form-label" for="complemento">Complemento</label>
        <input type="text" id="complemento" name="complemento" class="form-control" [(ngModel)]="paciente.endereco.complemento" />
      </div>

      <div class="form-group">
        <label class="form-label" for="bairro">Bairro</label>
        <input type="text" id="bairro" name="bairro" class="form-control" [(ngModel)]="paciente.endereco.bairro" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="cidade">Cidade</label>
        <input type="text" id="cidade" name="cidade" class="form-control" [(ngModel)]="paciente.endereco.cidade" required />
      </div>

      <div class="form-group">
        <label class="form-label" for="uf">UF</label>
        <input type="text" id="uf" name="uf" class="form-control" [(ngModel)]="paciente.endereco.uf" required maxlength="2" />
      </div>
      
      <div class="form-group">
        <label class="form-label" for="cep">CEP</label>
        <input type="text" id="cep" name="cep" class="form-control" [(ngModel)]="paciente.endereco.cep" required />
      </div>
    </div>

    <div class="mt-4 flex justify-between">
      <button type="button" class="btn btn-danger" routerLink="/dashboard/pacientes">Cancelar</button>
      <button type="submit" class="btn btn-success" [disabled]="!pacienteForm.form.valid">Salvar Paciente</button>
    </div>

  </form>
</div>

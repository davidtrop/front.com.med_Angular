@if (isVisible) {
  <div class="modal-backdrop fade-in">
    <div class="modal-dialog glass-card animate-fade-in">
      <div class="modal-header">
        <h3 style="margin: 0; display: flex; align-items: center; gap: 0.5rem;">
          <span style="color: var(--danger)">⚠️</span> {{ title }}
        </h3>
        <button class="close-btn" (click)="onCancel()" aria-label="Close modal">&times;</button>
      </div>
      
      <div class="modal-body">
        <p>{{ message }}</p>
      </div>
      
      <div class="modal-footer">
        <button class="btn btn-outline" (click)="onCancel()">
          Cancelar
        </button>
        <button class="btn btn-danger" (click)="onConfirm()">
          Confirmar
        </button>
      </div>
    </div>
  </div>
}
